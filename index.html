<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#FF9A9E">
<meta name="description" content="Frekee 保质期追踪 - 轻松记录，到期自动提醒">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1024 1024'%3E%3Crect width='1024' height='1024' fill='%23FF9A9E'/%3E%3Ctext x='512' y='512' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='300' font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
<title>Frekee - 保质期管家</title>
<style>
:root {
  --bg: #f7f7f9;
  --surface: #ffffff;
  --text: #1d1d1f;
  --text-secondary: #8e8e93;
  --accent: #FF7A8C;
  --accent-light: #FFE6E9;
  --warning: #f59e0b;
  --danger: #ef4444;
  --border: #e5e5ea;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Header */
.app-header {
  background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
  color: #2d2d2f;
  padding: 32px 20px 56px;
  border-radius: 0 0 24px 24px;
}
.app-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
}
.app-subtitle {
  font-size: 14px;
  opacity: 0.8;
}
.stats-bar {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}
.stat-pill {
  flex: 1;
  background: rgba(255,255,255,0.25);
  border-radius: 16px;
  padding: 12px 8px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.stat-num {
  font-size: 20px;
  font-weight: 700;
  display: block;
}
.stat-label {
  font-size: 11px;
  opacity: 0.7;
  display: block;
}

/* Content */
.container {
  padding: 20px;
}
.section-title {
  font-size: 16px;
  font-weight: 700;
  margin: 16px 20px 8px;
}
.item-list {
  padding: 0 20px;
}
.item-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.item-img {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.item-info {
  flex: 1;
  min-width: 0;
}
.item-name {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
}
.item-meta {
  font-size: 12px;
  color: var(--text-secondary);
}
.tag {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}
.tag-safe {
  background: var(--accent-light);
  color: var(--accent);
}
.tag-warning {
  background: #fef3c7;
  color: var(--warning);
}
.tag-danger {
  background: #fee2e2;
  color: var(--danger);
}

/* Add Item Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
}
.modal.active {
  display: block;
}
.modal-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
}
.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg);
  border: none;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
}
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-secondary);
}
.form-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 15px;
  background: var(--surface);
}
.photo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.photo-box {
  aspect-ratio: 4/3;
  border-radius: 16px;
  border: 2px dashed var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--text-secondary);
  font-size: 13px;
  background: var(--bg);
  overflow: hidden;
}
.photo-box.has-image {
  border: none;
}
.photo-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.btn-primary {
  width: 100%;
  height: 52px;
  background: var(--accent);
  color: white;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  border: none;
  cursor: pointer;
}
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  border: none;
  font-size: 28px;
  box-shadow: 0 4px 16px rgba(255, 122, 140, 0.4);
  cursor: pointer;
  z-index: 100;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
}
.tab-item {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
}
.tab-item.active {
  color: var(--accent);
}
.tab-icon {
  display: block;
  font-size: 22px;
  margin-bottom: 2px;
}
.hidden {
  display: none !important;
}
</style>
</head>
<body>
<!-- Header -->
<header class="app-header">
  <h1 class="app-title">Frekee</h1>
  <p class="app-subtitle">记录保质期，到期自动提醒</p>
  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">物品</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" style="color: var(--warning)" id="stat-warning">0</span>
      <span class="stat-label">即将过期</span>
    </div>
    <div class="stat-pill">
      <span class="stat-num" style="color: var(--danger)" id="stat-expired">0</span>
      <span class="stat-label">已过期</span>
    </div>
  </div>
</header>

<!-- Home Tab -->
<div id="tab-home">
  <div class="section-title">即将过期</div>
  <div class="item-list" id="warning-list"></div>
  <div class="section-title">全部物品</div>
  <div class="item-list" id="all-list"></div>
  <div class="empty-state" id="empty-state">
    <div style="font-size: 48px; display: block; margin-bottom: 12px;">📦</div>
    <div>还没有添加物品<br><small>点击右下角 + 开始添加</small></div>
  </div>
</div>

<!-- Category Tab -->
<div id="tab-category" class="hidden">
  <div class="container">
    <div id="category-list"></div>
  </div>
</div>

<!-- Stats Tab -->
<div id="tab-stats" class="hidden">
  <div class="container">
    <div class="stats-bar" style="padding: 0; margin: 0;">
      <div class="stat-pill" style="background: #ecfdf5;">
        <span class="stat-num" style="color: var(--text)" id="stat-saved">¥0</span>
        <span class="stat-label">本月节省</span>
      </div>
      <div class="stat-pill" style="background: #fff1f2;">
        <span class="stat-num" style="color: var(--danger)" id="stat-wasted">¥0</span>
        <span class="stat-label">本月浪费</span>
      </div>
    </div>
  </div>
</div>

<!-- Add Item Modal -->
<div id="add-modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">添加物品</div>
      <button class="modal-close" id="close-modal">×</button>
    </div>
    <div class="photo-grid">
      <div class="photo-box" id="production-box">
        <input type="file" id="production-photo" accept="image/*" capture="environment" hidden>
        <div id="production-preview"></div>
        <div id="production-placeholder">
          <span style="font-size: 32px;">📷</span>
          <span>生产日期</span>
        </div>
      </div>
      <div class="photo-box" id="expiry-box">
        <input type="file" id="expiry-photo" accept="image/*" capture="environment" hidden>
        <div id="expiry-preview"></div>
        <div id="expiry-placeholder">
          <span style="font-size: 32px;">📷</span>
          <span>保质期至</span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">物品名称</label>
      <input class="form-input" type="text" id="item-name" placeholder="例如：伊利纯牛奶">
    </div>
    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-input" id="item-category">
        <option value="">选择分类</option>
        <option value="food">食品</option>
        <option value="medicine">药品</option>
        <option value="cosmetic">化妆品</option>
        <option value="daily">日用品</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">生产日期</label>
      <input class="form-input" type="date" id="item-production">
    </div>
    <div class="form-group">
      <label class="form-label">保质期至</label>
      <input class="form-input" type="date" id="item-expiry">
    </div>
    <div class="form-group">
      <label class="form-label">存放位置（选填）</label>
      <input class="form-input" type="text" id="item-location" placeholder="例如：冰箱上层">
    </div>
    <button class="btn-primary" id="save-item">保存</button>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="open-add">+</button>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="home">
    <span class="tab-icon">🏠</span>
    <span>首页</span>
  </div>
  <div class="tab-item" data-tab="category">
    <span class="tab-icon">📂</span>
    <span>分类</span>
  </div>
  <div class="tab-item" data-tab="stats">
    <span class="tab-icon">📊</span>
    <span>统计</span>
  </div>
</div>

<script>
const CATEGORIES = [
  { key: 'food', name: '食品', icon: '🍔', color: '#d1fae5' },
  { key: 'medicine', name: '药品', icon: '💊', color: '#dbeafe' },
  { key: 'cosmetic', name: '化妆品', icon: '💄', color: '#fce7f3' },
  { key: 'daily', name: '日用品', icon: '🧴', color: '#fef3c7' }
]

// localStorage keys
const STORAGE_KEY = 'frekee-items'

// State
let items = []
let currentTab = 'home'
let photos = { production: null, expiry: null }

// DOM
const el = {
  total: document.getElementById('stat-total'),
  warning: document.getElementById('stat-warning'),
  expired: document.getElementById('stat-expired'),
  warningList: document.getElementById('warning-list'),
  allList: document.getElementById('all-list'),
  categoryList: document.getElementById('category-list'),
  empty: document.getElementById('empty-state'),
  addModal: document.getElementById('add-modal'),
  openAdd: document.getElementById('open-add'),
  closeModal: document.getElementById('close-modal'),
  productionPhoto: document.getElementById('production-photo'),
  expiryPhoto: document.getElementById('expiry-photo'),
  productionBox: document.getElementById('production-box'),
  expiryBox: document.getElementById('expiry-box'),
  productionPreview: document.getElementById('production-preview'),
  expiryPreview: document.getElementById('expiry-preview'),
  productionPlaceholder: document.getElementById('production-placeholder'),
  expiryPlaceholder: document.getElementById('expiry-placeholder'),
  saveItem: document.getElementById('save-item'),
  tabs: document.querySelectorAll('.tab-item'),
}

// Helpers
function getDaysDiff(d1, d2) {
  const date1 = new Date(d1).setHours(0, 0, 0, 0)
  const date2 = new Date(d2).setHours(0, 0, 0, 0)
  return Math.ceil((date2 - date1) / (1000 * 60 * 60 * 24))
}

function getItemStatus(expiryDate) {
  const days = getDaysDiff(new Date(), expiryDate)
  if (days < 0) return { status: 'danger', label: '已过期', days }
  if (days <= 7) return { status: 'warning', label: `${days}天后`, days }
  return { status: 'safe', label: `${days}天后`, days }
}

function loadItems() {
  try {
    const str = localStorage.getItem(STORAGE_KEY)
    return str ? JSON.parse(str) : []
  } catch (e) {
    console.error(e)
    return []
  }
}

function saveItems() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items))
  updateStats()
  render()
}

function updateStats() {
  const expired = items.filter(i => getItemStatus(i.expiryDate).status === 'danger').length
  const warning = items.filter(i => getItemStatus(i.expiryDate).status === 'warning').length
  el.total.textContent = items.length
  el.warning.textContent = warning
  el.expired.textContent = expired
  document.getElementById('stat-wasted').textContent = `¥${expired * 15}`
  document.getElementById('stat-saved').textContent = `¥${(items.length - expired) * 15}`
}

function getCategoryInfo(key) {
  return CATEGORIES.find(c => c.key === key) || { key, name: key, icon: '📦', color: '#e5e7eb' }
}

function renderItemCard(item) {
  const cat = getCategoryInfo(item.category)
  const { status, label, days } = getItemStatus(item.expiryDate)
  const tagClass = status === 'safe' ? 'tag-safe' : status === 'warning' ? 'tag-warning' : 'tag-danger'
  return `
    <div class="item-card" data-id="${item.id}" onclick="editItem('${item.id}')">
      <div class="item-img" style="background: ${cat.color}">${cat.icon}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${cat.name} · ${item.expiryDate} 到期</div>
      </div>
      <span class="tag ${tagClass}">${label}</span>
    </div>
  `
}

function render() {
  // Sort items: expired first, then warning, then by days
  items.sort((a, b) => {
    const sa = getItemStatus(a.expiryDate).status
    const sb = getItemStatus(b.expiryDate).status
    if (sa === 'danger' && sb !== 'danger') return -1
    if (sb === 'danger' && sa !== 'danger') return 1
    if (sa === 'warning' && sb === 'safe') return -1
    if (sb === 'warning' && sa === 'safe') return 1
    return getItemStatus(a.expiryDate).days - getItemStatus(b.expiryDate).days
  })

  const warningItems = items.filter(i => ['warning', 'danger'].includes(getItemStatus(i.expiryDate).status))
  el.warningList.innerHTML = warningItems.slice(0, 5).map(renderItemCard).join('')
  el.allList.innerHTML = items.slice(0, 20).map(renderItemCard).join('')

  // Render categories
  const catHTML = CATEGORIES.map(cat => {
    const count = items.filter(i => i.category === cat.key).length
    const warnCount = items.filter(i => i.category === cat.key && ['warning', 'danger'].includes(getItemStatus(i.expiryDate).status)).length
    return `
      <div class="item-card" onclick="goCategory('${cat.key}')">
        <div class="item-img" style="background: ${cat.color}">${cat.icon}</div>
        <div class="item-info">
          <div class="item-name">${cat.name}</div>
          <div class="item-meta">${count} 件物品 · ${warnCount} 件即将过期</div>
        </div>
        <span style="color: var(--text-secondary)">›</span>
      </div>
    `
  })
  el.categoryList.innerHTML = catHTML.join('')

  el.empty.style.display = items.length === 0 ? 'block' : 'none'
}

function handlePhotoUpload(e, type) {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = function(ev) {
    photos[type] = ev.target.result
    const preview = type === 'production' ? el.productionPreview : el.expiryPreview
    const box = type === 'production' ? el.productionBox : el.expiryBox
    const placeholder = type === 'production' ? el.productionPlaceholder : el.expiryPlaceholder
    preview.innerHTML = `<img src="${ev.target.result}" class="photo-preview">`
    box.classList.add('has-image')
  }
  reader.readAsDataURL(file)
}

function saveCurrentItem() {
  const name = document.getElementById('item-name').value.trim()
  const category = document.getElementById('item-category').value
  const production = document.getElementById('item-production').value
  const expiry = document.getElementById('item-expiry').value
  const location = document.getElementById('item-location').value.trim()

  if (!name || !category || !expiry) {
    alert('请填写完整信息')
    return
  }

  const newItem = {
    id: Date.now().toString(),
    name,
    category,
    productionDate: production,
    expiryDate: expiry,
    location,
    imageUrls: [photos.production, photos.expiry].filter(Boolean),
    remindDays: [7, 30],
    createdAt: new Date().toISOString()
  }

  items.push(newItem)
  saveItems()

  // Reset form
  document.getElementById('item-name').value = ''
  document.getElementById('item-category').value = ''
  document.getElementById('item-production').value = ''
  document.getElementById('item-expiry').value = ''
  document.getElementById('item-location').value = ''
  photos = { production: null, expiry: null }
  el.productionPreview.innerHTML = ''
  el.expiryPreview.innerHTML = ''
  el.productionBox.classList.remove('has-image')
  el.expiryBox.classList.remove('has-image')
  closeAddModal()
}

// Notification registration
if ('Notification' in window && 'serviceWorker' in navigator) {
  Notification.requestPermission()
}

// Check for reminders on load
items = loadItems()
updateStats()
render()
checkReminders()

function checkReminders() {
  const now = new Date()
  items.forEach(item => {
    const days = getDaysDiff(now, item.expiryDate)
    if (item.remindDays.includes(days)) {
      setTimeout(() => {
        new Notification(`Frekee提醒：${item.name}`, {
          body: `还有 ${days} 天过期，请及时使用`,
          icon: '/apple-touch-icon.png'
        })
      }, 500)
    }
  })
}

// Event listeners
el.openAdd.addEventListener('click', () => {
  el.addModal.classList.add('active')
})

el.closeModal.addEventListener('click', () => {
  el.addModal.classList.remove('active')
})

el.saveItem.addEventListener('click', saveCurrentItem)

el.productionPhoto.addEventListener('change', e => handlePhotoUpload(e, 'production'))
el.expiryPhoto.addEventListener('change', e => handlePhotoUpload(e, 'expiry'))

el.productionBox.addEventListener('click', () => el.productionPhoto.click())
el.expiryBox.addEventListener('click', () => el.expiryPhoto.click())

el.tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const tabId = tab.dataset.tab
    el.tabs.forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    document.getElementById(`tab-${tabId}`).classList.remove('hidden')
    document.getElementById(`tab-${currentTab}`).classList.add('hidden')
    currentTab = tabId
  })
})

// Expose for global
window.editItem = function(id) {
  // In future: open detail modal
  alert('点击了物品：' + (items.find(i => i.id === id) || {}).name)
}

window.goCategory = function(key) {
  alert(`分类：${getCategoryInfo(key).name} 查看功能开发中`)
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(err => console.log('SW registration failed', err))
  })
}
</script>
</body>
</html>
